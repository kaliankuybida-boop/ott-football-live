<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Головна</title>
  <link id="siteIcon" rel="icon" type="image/x-icon" href="">
  <link id="manifest" rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      text-align: center;
    }
    img.logo {
      max-width: 160px;
      margin-top: 17px;
    }
    hr {
      border: 0.8px solid #333;
      margin-top: 7px;
    }
    footer {
      text-align: center;
    }
    .install-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 20px;
      padding: 12px 19px;
      background-color: #1C1C1C;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 40px;
      -webkit-tap-highlight-color: transparent;
    }
    .install-btn img {
      width: 24px;
      height: 24px;
    }
    
    .glass-panel {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: rgba(20, 20, 20, 0.6);
  border: 0.8px solid #666;
  border-radius: 40px;
  padding: 11px;
  backdrop-filter: blur(8px);
  max-width: 400px;
  width: 84%;
  z-index: 9999;
}

.panel-button {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  color: #eee;
  font-size: 14px;
  transition: transform 0.2s ease, color 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}

.panel-button img {
  width: 30px;
  height: 30px;
  margin-bottom: 1px;
}
  </style>
</head>
<body>
  <header>
    <img id="logo" class="logo" src="" alt="Логотип">
  </header>
  <hr>
  <footer>
    <button id="installBtn" class="install-btn" style="display:none;">
      Встановити додаток
      <img src="/download.svg" alt="Іконка завантаження">
    </button>
  </footer>
  
    <div class="glass-panel">
  <a href="javascript:void(0)" onclick="goHome()" class="panel-button" href="#">
    <img src="/home.svg" alt="Home">
    <span>Головна</span>
  </a>
  <a href="javascript:void(0)" onclick="goTV()" class="panel-button" href="#">
    <img src="/tv.svg" alt="TV">
    <span>Канали</span>
  </a>
  <a href="javascript:void(0)" onclick="goProfile()" class="panel-button" href="#">
    <img src="/profile.svg" alt="Profile">
    <span>Профіль</span>
  </a>
</div>

  <script>
function goHome() {
  window.location.href = `/home.html?login=${encodeURIComponent(login)}&password=${encodeURIComponent(password)}`;
}

function goTV() {
  window.location.href = `/tv.html?login=${encodeURIComponent(login)}&password=${encodeURIComponent(password)}`;
}

function goProfile() {
  window.location.href = `/profile.html?login=${encodeURIComponent(login)}&password=${encodeURIComponent(password)}`;
}
      
    const params = new URLSearchParams(window.location.search);
    const login = params.get("login");
    const password = params.get("password");
    const logo = document.getElementById("logo");
    const manifest = document.getElementById("manifest");

if (login === "Free" && password === "Free") {
  logo.src = "free-home.png";
  manifest.href = "manifest-betking.json";
  siteIcon.href = "/betking-icon.png";
} else {
  logo.src = "home.png";
  manifest.href = "manifest.json";
  siteIcon.href = "/icon.png";
}

    let deferredPrompt;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = "inline-flex";
    });

    installBtn.addEventListener("click", () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === "accepted") {
            console.log("PWA встановлено");
          } else {
            console.log("Встановлення скасовано");
          }
          deferredPrompt = null;
        });
      }
    });
  </script>
</body>
</html>
